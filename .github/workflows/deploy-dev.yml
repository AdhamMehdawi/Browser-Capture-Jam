name: Deploy to dev

on:
  push:
    branches: [development]
    paths:
      - 'artifacts/api-server/**'
      - 'artifacts/snapcap-dashboard/**'
      - 'lib/**'
      - 'infra/envs/dev/**'
      - 'infra/modules/**'
      - '.github/workflows/deploy-dev.yml'
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  AZ_RG: VeloCap
  ACR_NAME: velocapcr
  API_APP_NAME: velocap-api-dev
  SWA_NAME: velocap-swa-dev
  API_URL: https://velocap-api-dev.greenrock-0aa61fcc.uaenorth.azurecontainerapps.io
  CLERK_PK: pk_test_ZmlybS10YXBpci05NS5jbGVyay5hY2NvdW50cy5kZXYk

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'artifacts/api-server/**'
              - 'lib/**'
            dashboard:
              - 'artifacts/snapcap-dashboard/**'
              - 'lib/api-client-react/**'
              - 'lib/api-zod/**'
            infra:
              - 'infra/envs/dev/**'
              - 'infra/modules/**'

  build-push-api:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - id: meta
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - run: |
          az acr build \
            --registry "${{ env.ACR_NAME }}" \
            --image "api-server:${{ steps.meta.outputs.tag }}" \
            --image "api-server:latest" \
            --file artifacts/api-server/Dockerfile \
            .

  apply-dev:
    needs: [detect-changes, build-push-api]
    # Run if infra changed OR we built a new image (to roll ACA onto the new tag)
    if: |
      always() &&
      (needs.detect-changes.outputs.infra == 'true' ||
       needs.build-push-api.result == 'success' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/envs/dev
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9
      - run: terraform init -no-color
      - name: terraform apply
        run: |
          IMAGE_TAG="${{ needs.build-push-api.outputs.image_tag }}"
          if [ -n "$IMAGE_TAG" ]; then
            terraform apply -auto-approve -no-color \
              -var "api_image=${{ env.ACR_NAME }}.azurecr.io/api-server:${IMAGE_TAG}"
          else
            terraform apply -auto-approve -no-color
          fi

  build-deploy-dashboard:
    needs: detect-changes
    if: needs.detect-changes.outputs.dashboard == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build dashboard
        env:
          VITE_API_URL: ${{ env.API_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ env.CLERK_PK }}
          PORT: '3000'
          BASE_PATH: '/'
        run: pnpm --filter @workspace/snapcap-dashboard run build

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to SWA
        run: |
          SWA_TOKEN=$(az staticwebapp secrets list \
            --name "${{ env.SWA_NAME }}" \
            --resource-group "${{ env.AZ_RG }}" \
            --query properties.apiKey -o tsv)
          npx --yes @azure/static-web-apps-cli deploy \
            ./artifacts/snapcap-dashboard/dist/public \
            --deployment-token "$SWA_TOKEN" \
            --env production \
            --no-use-keychain

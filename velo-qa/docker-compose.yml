services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: veloqa
      POSTGRES_PASSWORD: veloqa
      POSTGRES_DB: veloqa
    ports:
      # Host 5433 → container 5432 — avoids clashes with a native Postgres on the host.
      - '5433:5432'
    volumes:
      - veloqa_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U veloqa -d veloqa']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: veloqa
      MINIO_ROOT_PASSWORD: veloqa-secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - veloqa_minio:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10

  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 veloqa veloqa-secret;
      mc mb -p local/veloqa-dev || true;
      exit 0;
      "

volumes:
  veloqa_postgres:
  veloqa_minio:

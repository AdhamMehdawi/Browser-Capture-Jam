<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Velo QA · Preview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #09090b;
        --fg: #fafafa;
        --muted: #a1a1aa;
        --panel: #18181b;
        --border: #27272a;
        --accent: #7c3aed;
        --ok: #22c55e;
        --err: #ef4444;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 24px;
        border-bottom: 1px solid var(--border);
      }
      .brand { font-weight: 700; letter-spacing: .2px; font-size: 16px; }
      .brand span { color: var(--accent); }
      .meta { color: var(--muted); font-size: 13px; }
      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px;
        display: grid;
        gap: 16px;
      }
      video {
        width: 100%;
        max-height: 68vh;
        background: #000;
        border-radius: 10px;
        display: block;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px;
        display: grid;
        gap: 12px;
      }
      label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
      input[type=text] {
        width: 100%;
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        font: inherit;
      }
      input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
      .row { display: flex; gap: 10px; flex-wrap: wrap; }
      .row.right { justify-content: flex-end; }
      button {
        background: var(--panel);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 16px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button.primary { background: var(--accent); color: #ffffff; border-color: transparent; }
      button.danger { background: transparent; color: var(--err); border-color: #7f1d1d; }
      button:hover:not(:disabled) { filter: brightness(1.08); }
      button:disabled { opacity: .5; cursor: default; }
      .status { color: var(--muted); font-size: 13px; min-height: 18px; }
      .status.ok { color: var(--ok); }
      .status.err { color: var(--err); }
      .link {
        display: block;
        color: var(--accent);
        text-decoration: none;
        background: var(--bg);
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        font-family: ui-monospace, monospace;
        font-size: 12.5px;
        word-break: break-all;
      }
      .link:hover { border-color: var(--accent); }
      .empty {
        text-align: center;
        padding: 64px 24px;
        color: var(--muted);
      }
      .close-btn {
        background: transparent;
        border: none;
        color: var(--muted);
        font-size: 24px;
        cursor: pointer;
        padding: 4px 8px;
        line-height: 1;
        border-radius: 6px;
        transition: background 0.15s, color 0.15s;
      }
      .close-btn:hover {
        background: var(--panel);
        color: var(--fg);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">Velo<span>QA</span></div>
      <div class="meta" id="meta"></div>
      <button class="close-btn" id="close-header" title="Close">×</button>
    </header>
    <main id="main">
      <div class="empty" id="loading">Loading preview…</div>
    </main>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
